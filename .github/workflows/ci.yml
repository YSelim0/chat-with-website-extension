name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run formatting and lint checks
        run: npm run check

      - name: Run unit and component tests
        run: npm test

      - name: Build extension
        run: npm run build
